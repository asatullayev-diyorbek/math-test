<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematika Testi — 11-15 yosh</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f4f6f8;min-height:100vh;padding:1.5rem 1rem}
  .wrap{max-width:700px;margin:auto}
  .header{background:#1D9E75;border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .header-left h1{font-size:19px;font-weight:600;margin-bottom:3px}
  .header-left p{font-size:12px;opacity:.8}
  .pbar-bg{background:rgba(255,255,255,.3);border-radius:99px;height:5px;margin-top:10px}
  .pbar{background:#fff;height:5px;border-radius:99px;transition:width .4s}
  .qctr{font-size:11px;opacity:.75;margin-top:5px}
  .timer-box{text-align:center;flex-shrink:0}
  .timer-circle{width:64px;height:64px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
  .timer-svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
  .timer-time{font-size:14px;font-weight:600;line-height:1;position:relative;z-index:1}
  .timer-label{font-size:9px;opacity:.7;margin-top:2px;position:relative;z-index:1}
  .card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .qnum{font-size:11px;color:#888;margin-bottom:6px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .qtext{font-size:16px;color:#1a1a1a;line-height:1.6;margin-bottom:1rem}
  .qtext strong{font-weight:600;color:#1D9E75}
  .options{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #e8e8e8;border-radius:10px;cursor:pointer;font-size:15px;color:#1a1a1a;background:#fff;transition:border-color .15s,background .15s;width:100%;text-align:left;font-family:inherit}
  .opt:hover{border-color:#aaa;background:#f9f9f9}
  .opt.selected{border-color:#1D9E75;background:#E1F5EE}
  .olabel{width:26px;height:26px;border-radius:50%;background:#f4f4f4;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:#666}
  .opt.selected .olabel{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .open-input{width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:10px;font-size:15px;color:#1a1a1a;background:#fff;outline:none;font-family:inherit;transition:border-color .15s}
  .open-input:focus{border-color:#1D9E75}
  .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem}
  .btn{padding:10px 22px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#333;font-size:14px;cursor:pointer;font-family:inherit;transition:background .15s}
  .btn:hover{background:#f2f2f2}
  .btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .btn.primary:hover{background:#0F6E56}
  /* Result */
  .result-header{text-align:center;padding:1.5rem 1rem 1rem}
  .big-score{font-size:60px;font-weight:700;color:#1D9E75;line-height:1}
  .score-sub{font-size:14px;color:#888;margin-top:6px}
  .score-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:1.25rem 0}
  .scard{background:#f4f6f8;border-radius:10px;padding:.85rem;text-align:center}
  .scard-val{font-size:22px;font-weight:700;color:#1a1a1a}
  .scard-lbl{font-size:11px;color:#888;margin-top:3px}
  .result-msg{font-size:15px;color:#1a1a1a;line-height:1.6;background:#f4f6f8;border-radius:10px;padding:1rem;margin-bottom:1.5rem;text-align:center}
  .list-title{font-size:12px;font-weight:700;color:#888;margin-bottom:.75rem;letter-spacing:.5px;text-transform:uppercase}
  .ans-item{border:1px solid #e8e8e8;border-radius:12px;padding:.85rem 1rem;margin-bottom:.65rem;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .ans-top{display:flex;align-items:flex-start;gap:.75rem}
  .ans-badge{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-top:1px}
  .ans-badge.ok{background:#E1F5EE;color:#0F6E56}
  .ans-badge.err{background:#FCEBEB;color:#A32D2D}
  .ans-badge.skip{background:#f0f0f0;color:#888}
  .ans-body{flex:1}
  .ans-qnum{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
  .ans-qtext{font-size:14px;color:#1a1a1a;line-height:1.5;margin-bottom:.5rem}
  .ans-row{font-size:13px;margin-top:3px;color:#555}
  .ans-row span{color:#1a1a1a;font-weight:500}
  .ans-correct{color:#0F6E56;font-weight:500;margin-top:2px;font-size:13px}
  .ans-exp{font-size:12px;color:#999;margin-top:6px;border-top:1px solid #f0f0f0;padding-top:6px;line-height:1.5}
  .pts-chip{font-size:11px;padding:3px 9px;border-radius:99px;flex-shrink:0;font-weight:700}
  .pts-chip.ok{background:#E1F5EE;color:#0F6E56}
  .pts-chip.err{background:#f0f0f0;color:#999}
  @media(max-width:480px){
    .score-breakdown{grid-template-columns:1fr 1fr}
    .header{flex-direction:column;align-items:flex-start;gap:.75rem}
    .timer-box{align-self:flex-end}
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="header">
    <div class="header-left">
      <h1>Matematika testi</h1>
      <p>11–15 yoshli o'quvchilar uchun &middot; 10 ta savol</p>
      <div class="pbar-bg"><div class="pbar" id="pbar" style="width:0%"></div></div>
      <div class="qctr" id="qctr">1 / 10</div>
    </div>
    <div class="timer-box">
      <div class="timer-circle">
        <svg class="timer-svg" width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="29" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
          <circle cx="32" cy="32" r="29" fill="none" stroke="white" stroke-width="3"
            stroke-dasharray="182.2" stroke-dashoffset="0" id="timer-arc" stroke-linecap="round"/>
        </svg>
        <div class="timer-time" id="tdisp">20:00</div>
        <div class="timer-label">vaqt</div>
      </div>
    </div>
  </div>
  <div id="quiz-area"></div>
  <div class="btn-row" id="btn-row">
    <button class="btn" id="prev-btn" onclick="goPrev()" style="display:none">← Oldingi</button>
    <button class="btn" id="skip-btn" onclick="skipQ()">O'tkazib yuborish</button>
    <button class="btn primary" id="next-btn" onclick="goNext()">Keyingisi →</button>
  </div>
</div>

<script>
const TOTAL_SEC = 20 * 60;
const CIRC = 182.2;

const qs = [
  {type:"mc", q:"Agar x = 4 bo'lsa, <strong>3x² &minus; 5</strong> ning qiymati qancha?",
    opts:["43","37","48","11"], ans:"43", exp:"3&times;(4&sup2;)&minus;5 = 3&times;16&minus;5 = 48&minus;5 = 43"},
  {type:"mc", q:"Bir to'rtburchakning eni 7 sm, uzunligi enidan 3 sm katta. <strong>Perimetri</strong> qancha?",
    opts:["34 sm","38 sm","40 sm","28 sm"], ans:"34 sm", exp:"Uzunlik = 7+3 = 10. Perimetr = 2&times;(7+10) = 34 sm"},
  {type:"mc", q:"<strong>15% ning 200 dan</strong> qanchasi?",
    opts:["30","25","35","20"], ans:"30", exp:"200 &times; 15 &divide; 100 = 30"},
  {type:"mc", q:"Agar <strong>2a + 6 = 18</strong> bo'lsa, a ning qiymati?",
    opts:["6","4","8","3"], ans:"6", exp:"2a = 18&minus;6 = 12 &rarr; a = 6"},
  {type:"mc", q:"Uchburchak ichki burchaklari yig'indisi necha gradus?",
    opts:["180°","90°","360°","270°"], ans:"180°", exp:"Istalgan uchburchak burchaklari yig'indisi 180°"},
  {type:"mc", q:"<strong>2³ &times; 2²</strong> ni hisoblang.",
    opts:["32","16","64","8"], ans:"32", exp:"2³&times;2² = 2^(3+2) = 2&sup5; = 32"},
  {type:"mc", q:"Bir kishi 12 km yo'lni 2 soatda bosib o'tdi. <strong>O'rtacha tezligi</strong> qancha?",
    opts:["6 km/soat","4 km/soat","8 km/soat","10 km/soat"], ans:"6 km/soat", exp:"Tezlik = masofa &divide; vaqt = 12&divide;2 = 6 km/soat"},
  {type:"mc", q:"<strong>&radic;144</strong> ning qiymati?",
    opts:["12","11","13","14"], ans:"12", exp:"12 &times; 12 = 144, demak &radic;144 = 12"},
  {type:"open", q:"Bir sinf o'quvchilari sonining <strong>&frac23; qismi</strong> 20 kishi. Sinfda jami nechta o'quvchi bor?",
    ans:"30", alts:["30 ta","30ta"], exp:"&frac23; qismi = 20 bo'lsa &rarr; jami = 20 &divide; (2/3) = 20 &times; 3/2 = 30"},
  {type:"open", q:"<strong>1, 3, 6, 10, 15</strong> ketma-ketligining keyingi ikkita soni? (21, 28 shaklida yozing)",
    ans:"21, 28", alts:["21,28","21 28","21 va 28","21 - 28"], exp:"Qo'shimcha son bittaga ortadi (+2,+3,+4,+5 &rarr; +6,+7): 15+6=21, 21+7=28"}
];

let shuffled = qs.map(q => {
  if (q.type === "mc") {
    let arr = [...q.opts]; arr.sort(() => Math.random() - .5);
    return {...q, shuffled: arr};
  }
  return {...q};
});

let cur = 0, userAnswers = Array(10).fill(null), skipped = Array(10).fill(false);
let secLeft = TOTAL_SEC, timerInt = null, selIdx = -1;

function startTimer() {
  timerInt = setInterval(() => {
    secLeft--;
    updateTimerUI();
    if (secLeft <= 0) { clearInterval(timerInt); finishAll(); }
  }, 1000);
}

function updateTimerUI() {
  const m = Math.floor(secLeft / 60), s = secLeft % 60;
  document.getElementById('tdisp').textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  document.getElementById('timer-arc').style.strokeDashoffset = CIRC * (1 - secLeft / TOTAL_SEC);
  document.getElementById('tdisp').style.color = secLeft < 120 ? '#ffcccc' : '';
}

function render() {
  selIdx = -1;
  const q = shuffled[cur];
  document.getElementById('pbar').style.width = (cur / 10 * 100) + '%';
  document.getElementById('qctr').textContent = (cur + 1) + ' / 10';

  let html = `<div class="card"><div class="qnum">Savol ${cur + 1}</div><div class="qtext">${q.q}</div>`;
  if (q.type === "mc") {
    html += `<div class="options">`;
    const prev = userAnswers[cur];
    q.shuffled.forEach((o, i) => {
      const sel = prev === o ? 'selected' : '';
      html += `<button class="opt ${sel}" id="opt${i}" onclick="selectOpt(${i})">
        <span class="olabel">${["A","B","C","D"][i]}</span>${o}</button>`;
    });
    html += `</div>`;
  } else {
    const prev = userAnswers[cur] || '';
    html += `<input class="open-input" type="text" id="open-ans" value="${prev}" placeholder="Javobingizni yozing..." />`;
  }
  html += `</div>`;
  document.getElementById('quiz-area').innerHTML = html;
  document.getElementById('skip-btn').textContent = skipped[cur] ? 'Savolga qaytish' : "O'tkazib yuborish";
  document.getElementById('prev-btn').style.display = cur > 0 ? 'inline-block' : 'none';
  document.getElementById('next-btn').textContent = cur === 9 ? 'Yakunlash ✓' : 'Keyingisi →';
}

function selectOpt(i) {
  selIdx = i;
  document.querySelectorAll('.opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('opt' + i).classList.add('selected');
}

function saveCurrentAnswer() {
  const q = shuffled[cur];
  if (q.type === "mc") {
    if (selIdx >= 0) userAnswers[cur] = q.shuffled[selIdx];
  } else {
    const inp = document.getElementById('open-ans');
    if (inp) userAnswers[cur] = inp.value.trim();
  }
}

function goPrev() {
  saveCurrentAnswer();
  if (cur > 0) { cur--; render(); }
}

function skipQ() {
  saveCurrentAnswer();
  skipped[cur] = !skipped[cur];
  if (skipped[cur]) userAnswers[cur] = null;
  goNext();
}

function goNext() {
  saveCurrentAnswer();
  if (cur < 9) { cur++; render(); }
  else { finishAll(); }
}

function isCorrect(q, given) {
  if (!given && given !== "0") return false;
  const g = given.trim().toLowerCase();
  if (q.type === "mc") return given === q.ans;
  if (g === q.ans.toLowerCase()) return true;
  if (q.alts) return q.alts.some(a => g === a.toLowerCase());
  return false;
}

function finishAll() {
  clearInterval(timerInt);
  saveCurrentAnswer();
  showResult();
}

function showResult() {
  let correct = 0;
  shuffled.forEach((q, i) => { if (isCorrect(q, userAnswers[i])) correct++; });

  const qScore = correct * 9;
  const timeRatio = Math.max(0, secLeft / TOTAL_SEC);
  const timeScore = Math.round(timeRatio * 10);
  const total = qScore + timeScore;

  const usedSec = TOTAL_SEC - secLeft;
  const um = Math.floor(usedSec / 60), us = usedSec % 60;
  const timeUsed = (um < 10 ? '0' : '') + um + ':' + (us < 10 ? '0' : '') + us;
  const lm = Math.floor(secLeft / 60), ls = secLeft % 60;
  const timeLeft = (lm < 10 ? '0' : '') + lm + ':' + (ls < 10 ? '0' : '') + ls;

  let msg = '';
  if (total >= 90) msg = '🌟 Ajoyib natija! Siz haqiqiy matematik zehnsiz!';
  else if (total >= 75) msg = '💪 Juda yaxshi! Bilimingiz mustahkam, davom eting!';
  else if (total >= 55) msg = '📚 Yaxshi urinish! Ko\'proq mashq qiling!';
  else msg = '✨ Qo\'rqmang — matematika mashq bilan oson bo\'ladi!';

  let listHtml = '';
  shuffled.forEach((q, i) => {
    const given = userAnswers[i];
    const ok = isCorrect(q, given);
    const noAns = !given && given !== "0";
    const badgeClass = noAns ? 'skip' : ok ? 'ok' : 'err';
    const badgeIcon = noAns ? '—' : ok ? '✓' : '✗';
    const ptsClass = ok ? 'ok' : 'err';
    const ptsText = ok ? '+9 bal' : '+0 bal';
    const givenText = noAns
      ? '<em style="color:#aaa">Javob berilmadi</em>'
      : `<span>${given}</span>`;
    const plainQ = q.q.replace(/<[^>]+>/g, '');

    let ansContent = `<div class="ans-row">Berilgan javob: ${givenText}</div>`;
    if (!ok && !noAns) ansContent += `<div class="ans-correct">To'g'ri javob: ${q.ans}</div>`;
    if (noAns) ansContent += `<div class="ans-correct">To'g'ri javob: ${q.ans}</div>`;
    ansContent += `<div class="ans-exp">${q.exp}</div>`;

    listHtml += `
    <div class="ans-item">
      <div class="ans-top">
        <div class="ans-badge ${badgeClass}">${badgeIcon}</div>
        <div class="ans-body">
          <div class="ans-qnum">Savol ${i + 1}</div>
          <div class="ans-qtext">${plainQ}</div>
          ${ansContent}
        </div>
        <div class="pts-chip ${ptsClass}">${ptsText}</div>
      </div>
    </div>`;
  });

  document.getElementById('app').innerHTML = `
  <div class="wrap">
    <div class="card result-header">
      <div class="big-score">${total}</div>
      <div class="score-sub">100 baldan</div>
      <div class="score-breakdown" style="margin-top:1.25rem">
        <div class="scard"><div class="scard-val" style="color:#1D9E75">${correct}/10</div><div class="scard-lbl">To'g'ri javob</div></div>
        <div class="scard"><div class="scard-val">${qScore}</div><div class="scard-lbl">Savol bali (×9)</div></div>
        <div class="scard"><div class="scard-val" style="color:#378ADD">${timeScore}</div><div class="scard-lbl">Vaqt bali (${timeLeft} qoldi)</div></div>
      </div>
      <div class="result-msg" style="margin-top:1rem">${msg}<br>
        <span style="font-size:13px;color:#999">Sarflangan vaqt: ${timeUsed}</span>
      </div>
    </div>

    <div class="list-title">Barcha savollar va javoblar</div>
    ${listHtml}

    <div class="btn-row" style="margin-top:1.5rem;margin-bottom:2rem">
      <button class="btn primary" onclick="location.reload()">Qaytadan boshlash ↺</button>
    </div>
  </div>`;
}

render();
startTimer();
</script>
</body>
</html>
